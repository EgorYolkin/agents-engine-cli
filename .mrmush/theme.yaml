# Тема Mr. Mush для текущего проекта.
# Этот файл переопределяет встроенную тему и глобальную ~/.mrmush/theme.yaml.
# Изменяй только нужные поля: отсутствующие значения будут унаследованы.
# После правок просто перезапусти mrmush в этом проекте.

# Цвета интерфейса.
# fg и bg принимают hex-цвета (#aabbcc) или токены вроде cyan, magenta, whiteBright.
# Доступные флаги стиля: bold, dim, italic, underline, inverse.
colors:
  primary:
    fg: cyan
  ai:
    fg: magenta
  user:
    fg: blue
  success:
    fg: green
  warning:
    fg: yellow
  accent:
    fg: "#a855f7"
  dim:
    dim: true
  muted:
    fg: "#94a3b8"
  border:
    dim: true
  input:
    fg: "#a855f7"
  title:
    fg: "#0b0f19"
    bg: "#a855f7"
    bold: true

# Символы интерфейса.
# Здесь можно менять prompt, messageDot и рамку frame.
symbols:
  robot: 
  messageDot: ⬢
  pointer: ❯
  info: ℹ
  tick: ✔
  bullet: ●
  divider: ─
  prompt: ❯
  frame:
    topLeft: ╭
    topRight: ╮
    bottomLeft: ╰
    bottomRight: ╯
    horizontal: ─
    vertical: │

# Текстовый layout.
# splash содержит ASCII-арт гриба.
# maxSuggestions и inputPaddingX влияют на поведение input UI.
layout:
  agentName: mr. mush
  inputPaddingX: 0
  transcriptIndent: "  "
  messageIndent: "  "
  continuationIndent: "    "
  maxSuggestions: 8
  splashTitle: ауе бродяга
  splash:
    - "      ▄▄███▄▄"
    - "    ▄███▀█▀███▄"
    - "    ▀█████████▀"
    - "       █████"

# Анимации интерфейса.
# frames используются для индикатора thinking.
animation:
  frames:
    - ◐
    - ◓
    - ◑
    - ◒
